## Pin Meteor Lake-P SOF HDA DSP to Speaker profile
##
## History:
##   2026-03-01: initial fix — set api.acp.auto-profile=true for jack detect
##   2026-03-10: regression — auto-profile switches to Headphones profile (priority 10300)
##               on HDMI connect, killing Speaker output. Fixed by pinning Speaker profile
##               (priority 10200) which also exposes all 3 HDMI sinks.
##
## Speaker profile: "HiFi (HDMI1, HDMI2, HDMI3, Mic1, Mic2, Speaker)" — priority 10200
## Headphones profile: "HiFi (HDMI1, HDMI2, HDMI3, Headphones, Mic1, Mic2)" — priority 10300
##
## With auto-profile=false and device.profile set, WirePlumber will:
##   - Always boot into the Speaker profile (Speaker + all HDMI sinks available)
##   - Still auto-switch ports on jack plug/unplug via auto-port=true

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3-platform-skl_hda_dsp_generic"
      }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = false
        api.acp.auto-port    = true
        device.profile       = "HiFi (HDMI1, HDMI2, HDMI3, Mic1, Mic2, Speaker)"
      }
    }
  }
]
