## Enable automatic profile switching for the Meteor Lake-P SOF HDA DSP card
## Fixes headphone/speaker not auto-switching on jack plug/unplug
##
## WirePlumber disables api.acp.auto-profile by default (alsa.lua line 33),
## letting its own device hooks handle profile selection. However, for SOF HDA
## DSP cards on Intel Meteor Lake, jack detection events don't reliably trigger
## the WirePlumber select-profile event, so the ACP layer must handle it.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3-platform-skl_hda_dsp_generic"
      }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = true
        api.acp.auto-port    = true
      }
    }
  }
]
